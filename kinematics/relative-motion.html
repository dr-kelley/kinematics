<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Motion - Physics Simulations</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        input[type="range"] { width: 100%; cursor: pointer; }
        canvas { display: block; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Arrow drawing helper ───────────────────────────────────────────────────────

const drawArrow = (ctx, x1, y1, x2, y2, color, lw = 2.5, hl = 12) => {
    const dx = x2 - x1, dy = y2 - y1;
    if (Math.hypot(dx, dy) < 2) return;
    const ang = Math.atan2(dy, dx);
    ctx.save();
    ctx.strokeStyle = color; ctx.fillStyle = color;
    ctx.lineWidth = lw; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - hl * Math.cos(ang - Math.PI / 6), y2 - hl * Math.sin(ang - Math.PI / 6));
    ctx.lineTo(x2 - hl * Math.cos(ang + Math.PI / 6), y2 - hl * Math.sin(ang + Math.PI / 6));
    ctx.closePath(); ctx.fill();
    ctx.restore();
};

// ── 1D Tab ────────────────────────────────────────────────────────────────────

const OneDTab = () => {
    const [vBoat, setVBoat] = useState(4);       // m/s in water, + = downstream
    const [vCurrent, setVCurrent] = useState(2); // m/s, always rightward

    const canvasRef = useRef(null);
    const animRef   = useRef(null);
    const sRef      = useRef({ vBoat: 4, vCurrent: 2, boatX: 320, t: 0, prev: null });

    useEffect(() => { sRef.current.vBoat    = vBoat;    }, [vBoat]);
    useEffect(() => { sRef.current.vCurrent = vCurrent; }, [vCurrent]);

    const CW = 640, CH = 220, BANK = 45, RY = CH / 2;
    const VS = 22;   // px per m/s for vectors
    const PS = 45;   // px per m/s for boat animation speed

    useEffect(() => {
        sRef.current.boatX = CW / 2;
        sRef.current.t     = 0;
        sRef.current.prev  = null;

        const draw = () => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const { vBoat: vb, vCurrent: vc, boatX: bx, t } = sRef.current;
            const vg = vb + vc;

            ctx.clearRect(0, 0, CW, CH);

            // North bank
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(0, 0, CW, BANK);
            // South bank
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(0, CH - BANK, CW, BANK);

            // Bank labels
            ctx.fillStyle = '#14532d'; ctx.font = 'bold 12px sans-serif';
            ctx.fillText('North Bank', 8, 28);
            ctx.fillText('South Bank', 8, CH - 14);

            // Water
            const wg = ctx.createLinearGradient(0, BANK, 0, CH - BANK);
            wg.addColorStop(0, '#bfdbfe'); wg.addColorStop(1, '#93c5fd');
            ctx.fillStyle = wg;
            ctx.fillRect(0, BANK, CW, CH - 2 * BANK);

            // Animated current arrows
            const rows = [BANK + 18, RY, CH - BANK - 18];
            rows.forEach(ry => {
                const spacing = 70;
                for (let i = -1; i <= Math.ceil(CW / spacing) + 1; i++) {
                    const ax = ((i * spacing - t * vc * PS * 0.55 + CW * 10) % (CW + spacing));
                    if (ax >= -20 && ax <= CW + 20)
                        drawArrow(ctx, ax - 12, ry, ax + 12, ry, '#60a5fa', 1.5, 6);
                }
            });

            ctx.fillStyle = '#1d4ed8'; ctx.font = '11px sans-serif';
            ctx.fillText('Current →', CW - 90, BANK + 16);

            // Boat hull
            ctx.save();
            ctx.fillStyle = '#7c3aed'; ctx.strokeStyle = '#4c1d95'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.ellipse(bx, RY, 24, 9, 0, 0, 2 * Math.PI);
            ctx.fill(); ctx.stroke();
            // Mast
            ctx.strokeStyle = '#c4b5fd'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(bx, RY); ctx.lineTo(bx, RY - 16); ctx.stroke();
            ctx.restore();

            // Helper: draw one horizontal velocity vector
            const drawVec = (startX, y, mag, color, label) => {
                if (Math.abs(mag) < 0.02) {
                    ctx.fillStyle = color; ctx.font = 'bold 11px sans-serif';
                    ctx.fillText(`${label} = 0 m/s`, startX - 28, y - 6);
                    return;
                }
                const ex = startX + mag * VS;
                drawArrow(ctx, startX, y, ex, y, color, 3, 12);
                const lx = (startX + ex) / 2;
                ctx.fillStyle = color; ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${label} = ${mag.toFixed(1)} m/s`, lx, y - 7);
                ctx.textAlign = 'left';
            };

            drawVec(bx, RY - 22, vb, '#16a34a', 'v_boat,water');
            drawVec(bx, RY,       vc, '#2563eb', 'v_current');
            drawVec(bx, RY + 22, vg, '#dc2626', 'v_boat,ground');
        };

        const animate = ts => {
            const s = sRef.current;
            if (!s.prev) s.prev = ts;
            const dt = Math.min((ts - s.prev) / 1000, 0.05);
            s.prev = ts; s.t += dt;
            s.boatX += (s.vBoat + s.vCurrent) * PS * dt;
            if (s.boatX > CW + 30) s.boatX = -30;
            if (s.boatX < -30)     s.boatX = CW + 30;
            draw();
            animRef.current = requestAnimationFrame(animate);
        };

        animRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animRef.current);
    }, []);

    const vg = vBoat + vCurrent;

    return (
        <div className="grid grid-cols-12 gap-6">
            {/* Controls */}
            <div className="col-span-3 space-y-4">
                <div className="bg-gray-50 rounded-xl p-5 space-y-5">
                    <h3 className="font-semibold text-gray-800">Controls</h3>
                    <div>
                        <div className="flex justify-between text-sm mb-1">
                            <span className="font-medium text-gray-700">Boat Speed (water frame)</span>
                            <span className="font-bold text-green-700">{vBoat.toFixed(1)} m/s</span>
                        </div>
                        <input type="range" min="-8" max="8" step="0.5"
                            value={vBoat} onChange={e => setVBoat(parseFloat(e.target.value))} />
                        <div className="flex justify-between text-xs text-gray-400 mt-1">
                            <span>← Upstream</span><span>Downstream →</span>
                        </div>
                    </div>
                    <div>
                        <div className="flex justify-between text-sm mb-1">
                            <span className="font-medium text-gray-700">River Current</span>
                            <span className="font-bold text-blue-700">{vCurrent.toFixed(1)} m/s</span>
                        </div>
                        <input type="range" min="0" max="10" step="0.5"
                            value={vCurrent} onChange={e => setVCurrent(parseFloat(e.target.value))} />
                    </div>
                </div>

                <div className="bg-gray-50 rounded-xl p-5 space-y-3">
                    <h3 className="font-semibold text-gray-800">Reference Frame Velocities</h3>
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                        <div className="text-xs text-gray-500 mb-0.5">River / Water Frame</div>
                        <div className="text-2xl font-bold text-green-700">{vBoat.toFixed(1)} m/s</div>
                        <div className="text-xs text-green-600">{vBoat >= 0 ? 'Downstream' : 'Upstream'}</div>
                    </div>
                    <div className="bg-red-50 border border-red-200 rounded-lg p-3">
                        <div className="text-xs text-gray-500 mb-0.5">Ground Frame</div>
                        <div className="text-2xl font-bold text-red-700">{vg.toFixed(1)} m/s</div>
                        <div className="text-xs text-red-600">
                            {Math.abs(vg) < 0.05
                                ? 'Stationary relative to ground'
                                : vg > 0 ? 'Net: Downstream' : 'Net: Upstream'}
                        </div>
                    </div>
                    <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-3 space-y-1 text-xs font-mono text-indigo-800">
                        <div className="font-semibold font-sans text-indigo-900 text-xs mb-1">Equation</div>
                        <div>v_boat,ground =</div>
                        <div>  v_boat,water + v_current</div>
                        <div className="border-t border-indigo-200 pt-1 mt-1">
                            {vg.toFixed(1)} = {vBoat.toFixed(1)} + {vCurrent.toFixed(1)} m/s
                        </div>
                    </div>
                </div>
            </div>

            {/* Canvas */}
            <div className="col-span-9 space-y-3">
                <canvas ref={canvasRef} width={CW} height={CH}
                    className="rounded-xl shadow border border-gray-200 w-full" />
                <p className="text-xs text-gray-400 text-center">
                    Ground frame view — boat animates at its ground-frame velocity
                </p>

                {Math.abs(vg) < 0.1 && Math.abs(vBoat) > 0.05 && (
                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-sm text-yellow-800">
                        <strong>Notable case:</strong> The boat's upstream speed exactly cancels the current —
                        it is stationary relative to the ground even though it is moving through the water.
                    </div>
                )}

                <div className="bg-gray-50 rounded-xl p-4 text-xs text-gray-700">
                    <p className="font-semibold text-gray-800 mb-2">Vector key</p>
                    <div className="space-y-1">
                        <div className="flex items-center gap-2">
                            <span className="inline-block w-8 h-2 rounded bg-green-600"></span>
                            <span><strong>Green</strong> — v_boat,water: boat's velocity relative to the water</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="inline-block w-8 h-2 rounded bg-blue-600"></span>
                            <span><strong>Blue</strong> — v_current: water's velocity relative to the ground</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="inline-block w-8 h-2 rounded bg-red-600"></span>
                            <span><strong>Red</strong> — v_boat,ground: boat's actual velocity relative to the ground (vector sum)</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
};

// ── 2D Tab ────────────────────────────────────────────────────────────────────

const TwoDTab = () => {
    const [scenario, setScenario] = useState('boat');  // 'boat' | 'plane'
    const [frame, setFrame]       = useState('ground'); // 'ground' | 'medium'

    // Boat params
    const [boatSpeed,    setBoatSpeed]    = useState(5);  // m/s in water
    const [boatAngle,    setBoatAngle]    = useState(0);  // deg from straight-across, + = upstream tilt
    const [currentSpeed, setCurrentSpeed] = useState(3); // m/s, rightward

    // Plane params
    const [airspeed,  setAirspeed]  = useState(200); // km/h
    const [heading,   setHeading]   = useState(0);   // deg clockwise from North
    const [windSpeed, setWindSpeed] = useState(60);  // km/h
    const [windDir,   setWindDir]   = useState(90);  // deg clockwise from North (90 = blows East)

    const mainRef = useRef(null);
    const triRef  = useRef(null);
    const animRef = useRef(null);
    const sRef    = useRef({});
    const tRef    = useRef(0);
    const prevRef = useRef(null);

    // Keep sRef current with latest state
    useEffect(() => {
        Object.assign(sRef.current, {
            scenario, frame, boatSpeed, boatAngle, currentSpeed,
            airspeed, heading, windSpeed, windDir
        });
    });

    // Compute all three velocity vectors in canvas coords (right = +x, down = +y)
    const getVectors = (s) => {
        if (s.scenario === 'boat') {
            const ar = s.boatAngle * Math.PI / 180;
            // river flows right (+x), crossing = upward (–y)
            const vmx = -s.boatSpeed * Math.sin(ar);  // upstream tilt → negative x
            const vmy = -s.boatSpeed * Math.cos(ar);  // across river → upward (–y)
            const vcx = s.currentSpeed, vcy = 0;
            return { vmx, vmy, vcx, vcy, vgx: vmx + vcx, vgy: vmy + vcy, units: 'm/s' };
        } else {
            const hr = s.heading  * Math.PI / 180;
            const wr = s.windDir  * Math.PI / 180;
            const vmx =  s.airspeed  * Math.sin(hr);
            const vmy = -s.airspeed  * Math.cos(hr);
            const vcx =  s.windSpeed * Math.sin(wr);
            const vcy = -s.windSpeed * Math.cos(wr);
            return { vmx, vmy, vcx, vcy, vgx: vmx + vcx, vgy: vmy + vcy, units: 'km/h' };
        }
    };

    // ── Vector triangle canvas ─────────────────────────────────────────────────
    const drawTriangle = useCallback(() => {
        const canvas = triRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const s = sRef.current;
        if (!s.scenario) return;
        const { vmx, vmy, vcx, vcy, vgx, vgy, units } = getVectors(s);

        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#f8fafc';
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
        ctx.strokeRect(0.5, 0.5, W - 1, H - 1);

        // Title
        ctx.fillStyle = '#374151'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('Vector Addition Triangle', W / 2, 18);
        ctx.textAlign = 'left';

        // Scale so the largest component fits in ~40% of canvas
        const maxM = Math.max(Math.hypot(vmx, vmy), Math.hypot(vcx, vcy), Math.hypot(vgx, vgy), 0.001);
        const maxPx = Math.min(W, H) * 0.36;
        const sc = maxPx / maxM;

        // Origin chosen so the triangle is centred
        const ox = W / 2 - (vmx + vcx) * sc / 2;
        const oy = H / 2 - (vmy + vcy) * sc / 2 + 10;
        const ax = ox + vmx * sc, ay = oy + vmy * sc; // tip of first vector
        const bx = ax + vcx * sc, by = ay + vcy * sc; // tip of second (= ground endpoint)

        // v_obj/medium  → green
        drawArrow(ctx, ox, oy, ax, ay, '#16a34a', 2.5, 10);
        // v_medium/ground → blue (from tip of first)
        drawArrow(ctx, ax, ay, bx, by, '#2563eb', 2.5, 10);
        // v_obj/ground → red (closes triangle)
        drawArrow(ctx, ox, oy, bx, by, '#dc2626', 2.5, 10);

        // Labels (offset perpendicular to each segment)
        const labelSeg = (x1, y1, x2, y2, name, val, color, side) => {
            const len = Math.hypot(x2 - x1, y2 - y1);
            if (len < 4) return;
            const ang = Math.atan2(y2 - y1, x2 - x1);
            const nx = -Math.sin(ang) * 16 * side;
            const ny =  Math.cos(ang) * 16 * side;
            const mx = (x1 + x2) / 2 + nx;
            const my = (y1 + y2) / 2 + ny;
            ctx.fillStyle = color; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(name, mx, my - 4);
            ctx.fillText(`${val.toFixed(1)} ${units}`, mx, my + 8);
            ctx.textAlign = 'left';
        };

        const m1 = Math.hypot(vmx, vmy), m2 = Math.hypot(vcx, vcy), m3 = Math.hypot(vgx, vgy);
        const objLabel = s.scenario === 'boat' ? 'v_boat,water'  : 'v_plane,air';
        const medLabel = s.scenario === 'boat' ? 'v_water,ground': 'v_air,ground';
        const gndLabel = s.scenario === 'boat' ? 'v_boat,ground' : 'v_plane,ground';

        labelSeg(ox, oy, ax, ay, objLabel, m1, '#166534',  1);
        labelSeg(ax, ay, bx, by, medLabel, m2, '#1e40af',  1);
        labelSeg(ox, oy, bx, by, gndLabel, m3, '#991b1b', -1);

        // Equation
        ctx.fillStyle = '#374151'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
        const eq = s.scenario === 'boat'
            ? 'v_boat,water + v_water,ground = v_boat,ground'
            : 'v_plane,air + v_air,ground = v_plane,ground';
        ctx.fillText(eq, W / 2, H - 7);
        ctx.textAlign = 'left';
    }, []);

    // ── Main canvas ────────────────────────────────────────────────────────────
    const drawMain = useCallback(() => {
        const canvas = mainRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const s = sRef.current;
        if (!s.scenario) return;
        const t = tRef.current;
        const isGround = s.frame === 'ground';
        const { vmx, vmy, vcx, vcy, vgx, vgy } = getVectors(s);
        const cx = W / 2, cy = H / 2;

        ctx.clearRect(0, 0, W, H);

        // ── Background ────────────────────────────────────────────────────────
        if (s.scenario === 'boat') {
            const BANK = 45;
            // Banks
            ctx.fillStyle = '#4ade80'; ctx.fillRect(0, 0, W, BANK);
            ctx.fillStyle = '#22c55e'; ctx.fillRect(0, H - BANK, W, BANK);
            ctx.fillStyle = '#14532d'; ctx.font = 'bold 12px sans-serif';
            ctx.fillText('East Bank', 6, 28);
            ctx.fillText('West Bank', 6, H - 14);

            // Drifting tick-marks on banks when in water frame
            if (!isGround && s.currentSpeed > 0) {
                const off = (t * s.currentSpeed * 38) % 60;
                ctx.strokeStyle = '#166534'; ctx.lineWidth = 2;
                for (let i = -1; i < Math.ceil(W / 60) + 1; i++) {
                    const bx2 = ((i * 60 - off + W * 10) % W);
                    ctx.beginPath(); ctx.moveTo(bx2, 6);  ctx.lineTo(bx2, 22); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(bx2, H - 22); ctx.lineTo(bx2, H - 6); ctx.stroke();
                }
                ctx.fillStyle = '#15803d'; ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('← Banks drifting (water frame: medium is at rest)', W / 2, H - 27);
                ctx.textAlign = 'left';
            }

            // Water
            const wg = ctx.createLinearGradient(0, BANK, 0, H - BANK);
            wg.addColorStop(0, '#bfdbfe'); wg.addColorStop(1, '#93c5fd');
            ctx.fillStyle = wg;
            ctx.fillRect(0, BANK, W, H - 2 * BANK);

            // Animated current arrows (ground frame only)
            if (isGround && s.currentSpeed > 0) {
                const rowYs = [cy - 55, cy, cy + 55];
                rowYs.forEach(ry => {
                    const spacing = 68;
                    for (let i = -1; i <= Math.ceil(W / spacing) + 1; i++) {
                        const ax = ((i * spacing - t * s.currentSpeed * 38 + W * 10) % (W + spacing));
                        if (ax >= -20 && ax <= W + 20)
                            drawArrow(ctx, ax - 12, ry, ax + 12, ry, '#60a5fa', 1.5, 6);
                    }
                });
                ctx.fillStyle = '#1d4ed8'; ctx.font = '11px sans-serif';
                ctx.fillText('Current →', W - 90, BANK + 16);
            }

            // River flow label on water
            ctx.fillStyle = '#93c5fd'; ctx.font = 'italic 11px sans-serif';
            ctx.fillText('river flows right', 8, H / 2 + 4);

        } else {
            // Sky
            const sg = ctx.createLinearGradient(0, 0, 0, H);
            sg.addColorStop(0, '#dbeafe'); sg.addColorStop(1, '#eff6ff');
            ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

            // Wind streaks (ground frame)
            if (isGround && s.windSpeed > 0) {
                const mag = Math.hypot(vcx, vcy);
                const dx = vcx / mag, dy = vcy / mag;
                const streamLen = 32;
                ctx.strokeStyle = 'rgba(148,163,184,0.55)'; ctx.lineWidth = 1.5;
                for (let i = 0; i < 24; i++) {
                    const sx = ((i * 47 - t * mag * 0.28 * dx + W * 10) % W + W) % W;
                    const sy = (Math.floor(i / 5) * 52 + 30 + (i % 5) * 10 - t * mag * 0.28 * dy + H * 10) % H;
                    ctx.beginPath();
                    ctx.moveTo(sx - dx * streamLen / 2, sy - dy * streamLen / 2);
                    ctx.lineTo(sx + dx * streamLen / 2, sy + dy * streamLen / 2);
                    ctx.stroke();
                }
            }

            // Compass rose
            const crx = W - 28, cry = 28;
            ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(crx, cry - 16); ctx.lineTo(crx, cry + 16); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(crx - 16, cry); ctx.lineTo(crx + 16, cry); ctx.stroke();
            ctx.fillStyle = '#475569'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('N', crx, cry - 18);
            ctx.fillText('E', crx + 20, cry + 4);
            ctx.textAlign = 'left';

            if (!isGround) {
                ctx.fillStyle = '#64748b'; ctx.font = '11px sans-serif';
                ctx.fillText('Air frame: wind appears zero in this frame', 10, 20);
            }
        }

        // ── Object icon ────────────────────────────────────────────────────────
        if (s.scenario === 'boat') {
            ctx.save();
            ctx.fillStyle = '#7c3aed'; ctx.strokeStyle = '#4c1d95'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.ellipse(cx, cy, 24, 9, 0, 0, 2 * Math.PI);
            ctx.fill(); ctx.stroke();
            ctx.strokeStyle = '#c4b5fd'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - 16); ctx.stroke();
            ctx.restore();
        } else {
            // Airplane pointing in heading direction
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(s.heading * Math.PI / 180);
            ctx.fillStyle = '#1e40af'; ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, -22); ctx.lineTo(7, 10); ctx.lineTo(0, 5); ctx.lineTo(-7, 10);
            ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.restore();
        }

        // ── Velocity vectors ───────────────────────────────────────────────────
        const maxM = Math.max(
            Math.hypot(vmx, vmy), Math.hypot(vcx, vcy), Math.hypot(vgx, vgy), 0.001
        );
        const sc = Math.min(90 / maxM, 45);

        const labeledArrow = (vx, vy, color, label) => {
            const mag = Math.hypot(vx, vy);
            if (mag < 0.5) {
                ctx.fillStyle = color; ctx.font = '11px sans-serif';
                ctx.fillText(`${label} = 0`, cx + 8, cy - 8);
                return;
            }
            const ex = cx + vx * sc, ey = cy + vy * sc;
            drawArrow(ctx, cx, cy, ex, ey, color, 3, 12);
            // Label perpendicular offset
            const ang = Math.atan2(vy, vx);
            const nx = -Math.sin(ang) * 16, ny = Math.cos(ang) * 16;
            const lx = (cx + ex) / 2 + nx, ly = (cy + ey) / 2 + ny;
            ctx.fillStyle = color; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(label, lx, ly);
            ctx.textAlign = 'left';
        };

        // v_obj/medium always shown
        labeledArrow(vmx, vmy, '#16a34a', s.scenario === 'boat' ? 'v_boat,water' : 'v_plane,air');
        // v_medium/ground and v_obj/ground only in ground frame
        if (isGround) {
            labeledArrow(vcx, vcy, '#2563eb', s.scenario === 'boat' ? 'v_current' : 'v_wind');
            labeledArrow(vgx, vgy, '#dc2626', s.scenario === 'boat' ? 'v_boat,ground' : 'v_plane,ground');
        }

        // Frame label badge
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(6, H - 30, 290, 22, 4);
        else ctx.rect(6, H - 30, 290, 22);
        ctx.fill();
        ctx.fillStyle = '#374151'; ctx.font = 'bold 11px sans-serif';
        ctx.fillText(
            isGround
                ? 'Ground frame — all 3 vectors visible'
                : `${s.scenario === 'boat' ? 'Water' : 'Air'} frame — only v_obj,medium shown`,
            12, H - 14
        );
        ctx.restore();
    }, []);

    // ── Animation loop ─────────────────────────────────────────────────────────
    useEffect(() => {
        prevRef.current = null;
        const animate = ts => {
            if (!prevRef.current) prevRef.current = ts;
            const dt = Math.min((ts - prevRef.current) / 1000, 0.05);
            prevRef.current = ts;
            tRef.current += dt;
            drawMain();
            drawTriangle();
            animRef.current = requestAnimationFrame(animate);
        };
        animRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animRef.current);
    }, [drawMain, drawTriangle]);

    // ── Derived readouts ───────────────────────────────────────────────────────
    const { vmx, vmy, vcx, vcy, vgx, vgy, units } = getVectors(
        sRef.current.scenario
            ? sRef.current
            : { scenario, frame, boatSpeed, boatAngle, currentSpeed, airspeed, heading, windSpeed, windDir }
    );
    const gndMag  = Math.hypot(vgx, vgy);
    const objMag  = Math.hypot(vmx, vmy);

    return (
        <div className="space-y-5">
            {/* Scenario + frame toggles */}
            <div className="flex flex-wrap items-center gap-4">
                <div className="flex items-center gap-2">
                    <span className="text-sm font-semibold text-gray-700">Scenario:</span>
                    {[['boat', 'Boat Crossing River'], ['plane', 'Airplane in Wind']].map(([k, label]) => (
                        <button key={k} onClick={() => setScenario(k)}
                            className={`px-4 py-2 rounded-lg text-sm font-semibold transition-colors ${
                                scenario === k ? 'bg-indigo-600 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                            }`}>
                            {label}
                        </button>
                    ))}
                </div>
                <div className="flex items-center gap-2 ml-auto">
                    <span className="text-sm font-semibold text-gray-700">View from:</span>
                    <button
                        onClick={() => setFrame(f => f === 'ground' ? 'medium' : 'ground')}
                        className={`px-5 py-2 rounded-lg text-sm font-semibold border-2 transition-all ${
                            frame === 'ground'
                                ? 'bg-slate-700 text-white border-slate-700'
                                : 'bg-cyan-100 text-cyan-800 border-cyan-400 hover:bg-cyan-200'
                        }`}>
                        {frame === 'ground'
                            ? 'Ground Frame'
                            : `${scenario === 'boat' ? 'Water' : 'Air'} Frame`}
                    </button>
                </div>
            </div>

            {/* Canvases row */}
            <div className="flex gap-4 items-start">
                <canvas ref={mainRef} width={460} height={360}
                    className="rounded-xl shadow border border-gray-200 flex-shrink-0" />
                <div className="flex flex-col gap-2 flex-shrink-0">
                    <canvas ref={triRef} width={270} height={270}
                        className="rounded-xl shadow border border-gray-200" />
                    <p className="text-xs text-gray-400 text-center">Head-to-tail vector addition</p>
                </div>
            </div>

            {/* Controls grid */}
            <div className="grid grid-cols-3 gap-4">
                {scenario === 'boat' ? (
                    <>
                        <div className="bg-green-50 rounded-xl p-4 space-y-3">
                            <h3 className="font-semibold text-green-800 text-sm">Boat (relative to water)</h3>
                            <div>
                                <div className="flex justify-between text-xs mb-1 text-gray-600">
                                    <span>Speed</span>
                                    <span className="font-bold text-green-700">{boatSpeed.toFixed(1)} m/s</span>
                                </div>
                                <input type="range" min="0" max="12" step="0.5"
                                    value={boatSpeed} onChange={e => setBoatSpeed(parseFloat(e.target.value))} />
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1 text-gray-600">
                                    <span>Heading angle from straight-across</span>
                                    <span className="font-bold text-green-700">{boatAngle.toFixed(0)}°</span>
                                </div>
                                <input type="range" min="-70" max="70" step="5"
                                    value={boatAngle} onChange={e => setBoatAngle(parseFloat(e.target.value))} />
                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                    <span>← Downstream tilt</span><span>Upstream tilt →</span>
                                </div>
                            </div>
                        </div>

                        <div className="bg-blue-50 rounded-xl p-4 space-y-3">
                            <h3 className="font-semibold text-blue-800 text-sm">River Current</h3>
                            <div>
                                <div className="flex justify-between text-xs mb-1 text-gray-600">
                                    <span>Current speed</span>
                                    <span className="font-bold text-blue-700">{currentSpeed.toFixed(1)} m/s</span>
                                </div>
                                <input type="range" min="0" max="12" step="0.5"
                                    value={currentSpeed} onChange={e => setCurrentSpeed(parseFloat(e.target.value))} />
                            </div>
                            <div className="text-xs text-blue-700 bg-blue-100 rounded p-2">
                                Direction: rightward (always)
                            </div>
                        </div>

                        <div className="bg-red-50 rounded-xl p-4 space-y-2">
                            <h3 className="font-semibold text-red-800 text-sm">Resultant (Ground Frame)</h3>
                            <div className="text-2xl font-bold text-red-700">{gndMag.toFixed(2)} m/s</div>
                            <div className="text-xs text-gray-600">
                                Drift angle from straight-across: {(Math.atan2(vgx, -vgy) * 180 / Math.PI).toFixed(1)}°
                            </div>
                            <div className="text-xs font-mono bg-white rounded p-2 text-gray-700">
                                downstream: {vgx.toFixed(2)} m/s<br />
                                across:     {(-vgy).toFixed(2)} m/s
                            </div>
                        </div>
                    </>
                ) : (
                    <>
                        <div className="bg-blue-50 rounded-xl p-4 space-y-3">
                            <h3 className="font-semibold text-blue-800 text-sm">Airplane (relative to air)</h3>
                            <div>
                                <div className="flex justify-between text-xs mb-1 text-gray-600">
                                    <span>Airspeed</span>
                                    <span className="font-bold text-blue-700">{airspeed} km/h</span>
                                </div>
                                <input type="range" min="50" max="600" step="10"
                                    value={airspeed} onChange={e => setAirspeed(parseFloat(e.target.value))} />
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1 text-gray-600">
                                    <span>Heading (° clockwise from N)</span>
                                    <span className="font-bold text-blue-700">{heading}°</span>
                                </div>
                                <input type="range" min="0" max="359" step="5"
                                    value={heading} onChange={e => setHeading(parseFloat(e.target.value))} />
                            </div>
                        </div>

                        <div className="bg-cyan-50 rounded-xl p-4 space-y-3">
                            <h3 className="font-semibold text-cyan-800 text-sm">Wind (air relative to ground)</h3>
                            <div>
                                <div className="flex justify-between text-xs mb-1 text-gray-600">
                                    <span>Wind speed</span>
                                    <span className="font-bold text-cyan-700">{windSpeed} km/h</span>
                                </div>
                                <input type="range" min="0" max="250" step="10"
                                    value={windSpeed} onChange={e => setWindSpeed(parseFloat(e.target.value))} />
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1 text-gray-600">
                                    <span>Wind direction (blows toward, ° from N)</span>
                                    <span className="font-bold text-cyan-700">{windDir}°</span>
                                </div>
                                <input type="range" min="0" max="359" step="5"
                                    value={windDir} onChange={e => setWindDir(parseFloat(e.target.value))} />
                            </div>
                        </div>

                        <div className="bg-red-50 rounded-xl p-4 space-y-2">
                            <h3 className="font-semibold text-red-800 text-sm">Ground Speed & Track</h3>
                            <div className="text-2xl font-bold text-red-700">{gndMag.toFixed(0)} km/h</div>
                            <div className="text-xs text-gray-600">
                                Track: {((Math.atan2(vgx, -vgy) * 180 / Math.PI + 360) % 360).toFixed(1)}° from N
                            </div>
                            <div className="text-xs font-mono bg-white rounded p-2 text-gray-700">
                                East:  {vgx.toFixed(1)} km/h<br />
                                North: {(-vgy).toFixed(1)} km/h
                            </div>
                        </div>
                    </>
                )}
            </div>

            {/* Legend */}
            <div className="bg-gray-50 rounded-xl p-4 text-xs text-gray-700">
                <p className="font-semibold text-gray-800 text-sm mb-2">Vector key</p>
                <div className="space-y-1">
                    <div className="flex items-center gap-2">
                        <span className="inline-block w-8 h-2 rounded bg-green-600"></span>
                        <span>
                            <strong>Green</strong> — v_{scenario === 'boat' ? 'boat,water' : 'plane,air'}:
                            velocity of {scenario === 'boat' ? 'boat relative to water' : 'plane relative to air'} (always shown)
                        </span>
                    </div>
                    <div className="flex items-center gap-2">
                        <span className="inline-block w-8 h-2 rounded bg-blue-600"></span>
                        <span>
                            <strong>Blue</strong> — v_{scenario === 'boat' ? 'water,ground' : 'air,ground'}:
                            velocity of {scenario === 'boat' ? 'water relative to ground' : 'air (wind) relative to ground'} (ground frame only)
                        </span>
                    </div>
                    <div className="flex items-center gap-2">
                        <span className="inline-block w-8 h-2 rounded bg-red-600"></span>
                        <span>
                            <strong>Red</strong> — v_{scenario === 'boat' ? 'boat,ground' : 'plane,ground'}:
                            resultant velocity relative to ground (ground frame only)
                        </span>
                    </div>
                </div>
            </div>
        </div>
    );
};

// ── Main component ─────────────────────────────────────────────────────────────

const RelativeMotionSimulator = () => {
    const [tab, setTab] = useState('1d');

    return (
        <div className="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">
            <div className="container mx-auto px-4 py-8 max-w-6xl">

                {/* Back button */}
                <div className="mb-4">
                    <a href="index.html"
                        className="text-indigo-600 hover:text-indigo-800 font-medium text-sm">
                        ← Back to Kinematics
                    </a>
                </div>

                {/* Header */}
                <div className="bg-white rounded-2xl shadow-xl p-8 mb-6">
                    <h1 className="text-4xl font-bold text-indigo-900 mb-2 text-center">
                        Relative Motion
                    </h1>
                    <p className="text-center text-gray-600 max-w-2xl mx-auto">
                        How a velocity is measured depends entirely on who is doing the measuring.
                        Explore how the same motion looks different from different reference frames.
                    </p>
                </div>

                {/* Tabs */}
                <div className="flex gap-2 mb-6">
                    {[
                        ['1d', '1D — River & Current'],
                        ['2d', '2D — Boat Crossing / Airplane in Wind'],
                    ].map(([k, label]) => (
                        <button key={k} onClick={() => setTab(k)}
                            className={`px-6 py-3 rounded-xl font-semibold text-sm transition-colors shadow ${
                                tab === k
                                    ? 'bg-indigo-600 text-white'
                                    : 'bg-white text-gray-600 hover:bg-indigo-50'
                            }`}>
                            {label}
                        </button>
                    ))}
                </div>

                {/* Tab body */}
                <div className="bg-white rounded-2xl shadow-xl p-8">
                    {tab === '1d' ? <OneDTab /> : <TwoDTab />}
                </div>

            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<RelativeMotionSimulator />);
</script>
</body>
</html>
