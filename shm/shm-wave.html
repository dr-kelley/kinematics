<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHM & Wave Motion</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');
        body { margin:0; padding:0; font-family:'DM Sans',sans-serif; background:#0f1117; color:#e2e8f0; }
        canvas { display:block; }
        input[type="range"] {
            -webkit-appearance:none; appearance:none;
            width:100%; height:4px; background:#374151; border-radius:2px; outline:none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance:none; width:14px; height:14px;
            border-radius:50%; background:#60a5fa; cursor:pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width:14px; height:14px; border-radius:50%;
            background:#60a5fa; cursor:pointer; border:none;
        }
        .panel-label {
            font-family:'Space Mono',monospace; font-size:11px;
            letter-spacing:0.14em; text-transform:uppercase; color:#9ca3af;
        }
        .value-display { font-family:'Space Mono',monospace; font-size:12px; color:#93c5fd; }
        .ctrl-label    { font-size:13px; color:#d1d5db; }
        .sub-label     { font-size:11px; color:#6b7280; font-family:'Space Mono',monospace; }
        .btn {
            font-family:'Space Mono',monospace; font-size:12px; letter-spacing:0.06em;
            padding:9px 22px; border:none; border-radius:5px; cursor:pointer;
            transition:all 0.15s ease; display:flex; align-items:center; gap:7px;
        }
        .btn-primary   { background:#1d4ed8; color:#eff6ff; }
        .btn-primary:hover { background:#2563eb; }
        .btn-active    { background:#166534; color:#dcfce7; }
        .btn-active:hover  { background:#15803d; }
        .btn-secondary { background:#374151; color:#d1d5db; }
        .btn-secondary:hover { background:#4b5563; color:#f3f4f6; }
        .card { background:#1c2030; border-radius:8px; padding:16px 20px; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const Play  = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const Pause = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
    const ResetIcon = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>;

    const PX_PER_CM = 20;

    // ── coil spring: vertical, from (x,y1) to (x,y2) ─────────────────────────
    function drawSpring(ctx, x, y1, y2, coils=8, hw=10, color='#4a90d9') {
        const seg = (y2 - y1) / (coils * 2 + 2);
        ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round';
        ctx.moveTo(x, y1); ctx.lineTo(x, y1+seg);
        for (let i=0; i<coils; i++) {
            ctx.lineTo(x+hw, y1+seg+(2*i+1)*seg);
            ctx.lineTo(x-hw, y1+seg+(2*i+2)*seg);
        }
        ctx.lineTo(x, y2-seg); ctx.lineTo(x, y2); ctx.stroke();
    }

    function Toggle({ value, onChange, label }) {
        return (
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
                <div onClick={()=>onChange(!value)} style={{
                    width:36,height:20,borderRadius:10,position:'relative',
                    cursor:'pointer',transition:'background 0.2s',flexShrink:0,
                    background: value ? '#1d4ed8' : '#374151'
                }}>
                    <div style={{
                        position:'absolute',top:2,left:value?18:2,
                        width:16,height:16,borderRadius:'50%',transition:'left 0.2s',
                        background: value ? '#93c5fd' : '#6b7280'
                    }}/>
                </div>
                <span className="ctrl-label" style={{userSelect:'none'}}>{label}</span>
            </label>
        );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    function SHMWave() {
        const [amplitudeCm,  setAmplitudeCm]  = useState(3.0);   // cm
        const [frequency,    setFrequency]    = useState(0.5);   // Hz
        const [waveSpeedCms, setWaveSpeedCms] = useState(8);     // cm/s
        const [showGrid,     setShowGrid]     = useState(true);
        const [showEqLine,   setShowEqLine]   = useState(true);
        const [showRope,     setShowRope]     = useState(false); // smooth rope wave on right
        const [isPlaying,    setIsPlaying]    = useState(false);

        const leftRef  = useRef(null);
        const rightRef = useRef(null);
        const stateRef = useRef({
            t:0, leftTrail:[], lastTimestamp:null,
            isPlaying:false,
            amplitudePx: 3.0*PX_PER_CM,
            frequency: 0.5,
            waveSpeedPx: 8*PX_PER_CM,
            showGrid:true, showEqLine:true, showRope:false,
        });
        const rafRef = useRef(null);

        // ── layout constants ──────────────────────────────────────────────────
        const PANEL_H  = 460;
        const LEFT_W   = 260;
        const RIGHT_W  = 520;

        // left panel geometry
        const CX_L    = LEFT_W / 2;
        const CEIL_L  = 36;
        const EQ_Y_L  = PANEL_H * 0.52;
        const MASS_R_L = 16;
        const TRAIL_X  = CX_L + MASS_R_L + 12;

        // right panel — array of N coupled masses
        const N_MASSES  = 12;          // number of oscillators
        const MARGIN_R  = 30;          // left/right padding inside right canvas
        const SPACING   = (RIGHT_W - 2*MARGIN_R) / (N_MASSES - 1);  // px between masses
        const CEIL_R    = 36;
        const EQ_Y_R    = PANEL_H * 0.52;
        const MASS_R_R  = 10;          // smaller masses for the array
        const REST_LEN  = EQ_Y_R - CEIL_R - MASS_R_R;   // natural spring length to eq

        // sync stateRef with React state
        useEffect(()=>{ stateRef.current.amplitudePx  = amplitudeCm*PX_PER_CM; },[amplitudeCm]);
        useEffect(()=>{ stateRef.current.frequency    = frequency;              },[frequency]);
        useEffect(()=>{ stateRef.current.waveSpeedPx  = waveSpeedCms*PX_PER_CM;},[waveSpeedCms]);
        useEffect(()=>{ stateRef.current.showGrid     = showGrid;               },[showGrid]);
        useEffect(()=>{ stateRef.current.showEqLine   = showEqLine;             },[showEqLine]);
        useEffect(()=>{ stateRef.current.showEnvelope = showRope;             },[showRope]);
        useEffect(()=>{ stateRef.current.isPlaying    = isPlaying;              },[isPlaying]);

        // ── shared drawing helpers ────────────────────────────────────────────
        function drawGrid(ctx, w, h) {
            ctx.strokeStyle='#1e2533'; ctx.lineWidth=1;
            for (let x=0;x<w;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke(); }
            for (let y=0;y<h;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke(); }
        }

        function drawEqLine(ctx, w, eq) {
            ctx.save();
            ctx.strokeStyle='rgba(96,165,250,0.20)'; ctx.lineWidth=1; ctx.setLineDash([6,4]);
            ctx.beginPath(); ctx.moveTo(0,eq); ctx.lineTo(w,eq); ctx.stroke();
            ctx.restore();
        }

        function drawMass(ctx, cx, cy, r, alpha=1) {
            const g = ctx.createRadialGradient(cx-r*0.28, cy-r*0.32, r*0.1, cx, cy, r);
            g.addColorStop(0, `rgba(147,197,253,${alpha})`);
            g.addColorStop(1, `rgba(29,78,216,${alpha})`);
            ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
            ctx.fillStyle=g; ctx.fill();
            ctx.strokeStyle=`rgba(96,165,250,${alpha})`; ctx.lineWidth=1.2; ctx.stroke();
        }

        function mono(ctx, txt, x, y, color='#9ca3af') {
            ctx.font='11px "Space Mono",monospace'; ctx.fillStyle=color; ctx.fillText(txt,x,y);
        }

        // ceiling bar + hatch marks
        function drawCeiling(ctx, x0, x1, y) {
            ctx.fillStyle='#374151';
            ctx.fillRect(x0, y-8, x1-x0, 8);
            ctx.strokeStyle='#4b5563'; ctx.lineWidth=0.8;
            ctx.strokeRect(x0, y-8, x1-x0, 8);
            ctx.strokeStyle='#4b5563';
            for (let hx=x0+4; hx<x1; hx+=8) {
                ctx.beginPath(); ctx.moveTo(hx,y-8); ctx.lineTo(hx-5,y-13); ctx.stroke();
            }
        }

        // ── LEFT panel draw ───────────────────────────────────────────────────
        function drawLeft(ctx, t) {
            const s = stateRef.current;
            const A = s.amplitudePx, f = s.frequency;
            const massY = EQ_Y_L + A*Math.sin(2*Math.PI*f*t);

            ctx.clearRect(0,0,LEFT_W,PANEL_H);
            if (s.showGrid)   drawGrid(ctx,LEFT_W,PANEL_H);
            if (s.showEqLine) drawEqLine(ctx,LEFT_W,EQ_Y_L);

            drawCeiling(ctx, CX_L-40, CX_L+40, CEIL_L);
            drawSpring(ctx, CX_L, CEIL_L, massY-MASS_R_L, 10, 13, '#4a90d9');

            // trail
            const trail = s.leftTrail;
            if (trail.length>1) {
                ctx.beginPath();
                ctx.strokeStyle='rgba(251,191,36,0.9)'; ctx.lineWidth=2; ctx.lineJoin='round';
                ctx.moveTo(TRAIL_X, trail[0].y);
                for (let i=1;i<trail.length;i++) ctx.lineTo(TRAIL_X, trail[i].y);
                ctx.stroke();
            }

            drawMass(ctx, CX_L, massY, MASS_R_L);

            const dispCm = ((massY-EQ_Y_L)/PX_PER_CM).toFixed(1);
            const sign   = parseFloat(dispCm)>=0 ? '+' : '';
            mono(ctx, `y = ${sign}${dispCm} cm`, 8, PANEL_H-16, '#60a5fa');
            mono(ctx, `t = ${t.toFixed(2)} s`,   LEFT_W-84, PANEL_H-16, '#9ca3af');
        }

        // ── RIGHT panel draw — coupled oscillator array ───────────────────────
        function drawRight(ctx, t) {
            const s = stateRef.current;
            const A = s.amplitudePx, f = s.frequency, v = s.waveSpeedPx;

            ctx.clearRect(0,0,RIGHT_W,PANEL_H);
            if (s.showGrid)   drawGrid(ctx,RIGHT_W,PANEL_H);
            if (s.showEqLine) drawEqLine(ctx,RIGHT_W,EQ_Y_R);

            // full ceiling bar spanning all masses
            drawCeiling(ctx, MARGIN_R - 20, RIGHT_W - MARGIN_R + 20, CEIL_R);

            // compute each mass position
            // Phase of mass i: φ_i = 2π·f·x_i / v  (rightward-travelling wave)
            const massPositions = [];
            for (let i=0; i<N_MASSES; i++) {
                const mx = MARGIN_R + i*SPACING;
                const phi = (2*Math.PI*f*mx) / v;   // spatial phase delay
                const my  = EQ_Y_R + A*Math.sin(2*Math.PI*f*t - phi);
                massPositions.push({x:mx, y:my});
            }

            if (s.showEnvelope) {
                // ── SMOOTH WAVE MODE: draw a continuous rope, fade out masses ──
                // Springs first (faded), then rope on top
                for (let i=0; i<N_MASSES; i++) {
                    const {x:mx, y:my} = massPositions[i];
                    drawSpring(ctx, mx, CEIL_R, my-MASS_R_R, 7, 7, 'rgba(59,125,216,0.25)');
                }

                // Sample the continuous wave at many x points for a smooth rope
                const ROPE_STEPS = 300;
                const x0 = MARGIN_R, x1 = RIGHT_W - MARGIN_R;
                const ropePoints = [];
                for (let k=0; k<=ROPE_STEPS; k++) {
                    const rx = x0 + (x1-x0)*(k/ROPE_STEPS);
                    const phi = (2*Math.PI*f*rx) / v;
                    const ry = EQ_Y_R + A*Math.sin(2*Math.PI*f*t - phi);
                    ropePoints.push({x:rx, y:ry});
                }

                // Draw rope as a thick stroked path with a highlight
                ctx.save();
                ctx.lineWidth = 6;
                ctx.lineJoin = 'round';
                ctx.lineCap  = 'round';
                // shadow glow
                ctx.shadowColor = 'rgba(251,191,36,0.5)';
                ctx.shadowBlur  = 8;
                ctx.strokeStyle = '#b45309';
                ctx.beginPath();
                ctx.moveTo(ropePoints[0].x, ropePoints[0].y);
                for (let k=1; k<ropePoints.length; k++) ctx.lineTo(ropePoints[k].x, ropePoints[k].y);
                ctx.stroke();
                // brighter centre highlight
                ctx.shadowBlur  = 0;
                ctx.lineWidth   = 2.5;
                ctx.strokeStyle = '#fbbf24';
                ctx.beginPath();
                ctx.moveTo(ropePoints[0].x, ropePoints[0].y);
                for (let k=1; k<ropePoints.length; k++) ctx.lineTo(ropePoints[k].x, ropePoints[k].y);
                ctx.stroke();
                ctx.restore();

                // Faded masses underneath (so students can still locate them)
                for (let i=0; i<N_MASSES; i++) {
                    const {x:mx, y:my} = massPositions[i];
                    drawMass(ctx, mx, my, MASS_R_R, 0.18);
                }

            } else {
                // ── DISCRETE MODE: springs, coupling strings, full masses ──
                // coupling strings between adjacent mass centers
                for (let i=0; i<N_MASSES-1; i++) {
                    const a = massPositions[i], b = massPositions[i+1];
                    ctx.beginPath();
                    ctx.strokeStyle='rgba(203,213,225,0.30)'; ctx.lineWidth=1;
                    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
                for (let i=0; i<N_MASSES; i++) {
                    const {x:mx, y:my} = massPositions[i];
                    drawSpring(ctx, mx, CEIL_R, my-MASS_R_R, 7, 7, '#3b7dd8');
                    drawMass(ctx, mx, my, MASS_R_R);
                }
            }

            // wave propagation arrow
            const arrowY = 18;
            ctx.strokeStyle='#4ade80'; ctx.fillStyle='#4ade80'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.moveTo(MARGIN_R, arrowY); ctx.lineTo(RIGHT_W-MARGIN_R, arrowY); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(RIGHT_W-MARGIN_R+6, arrowY);
            ctx.lineTo(RIGHT_W-MARGIN_R-5, arrowY-5);
            ctx.lineTo(RIGHT_W-MARGIN_R-5, arrowY+5);
            ctx.closePath(); ctx.fill();
            mono(ctx, 'wave propagation →', MARGIN_R+4, arrowY-4, '#4ade80');

            // annotations
            const lambdaCm = (v/f/PX_PER_CM).toFixed(1);
            mono(ctx, `λ = ${lambdaCm} cm`,        8, PANEL_H-28, '#d1d5db');
            mono(ctx, `T = ${(1/f).toFixed(2)} s`, 8, PANEL_H-14, '#9ca3af');
            mono(ctx, `t = ${t.toFixed(2)} s`, RIGHT_W-90, PANEL_H-14, '#9ca3af');
        }

        // ── animation loop ────────────────────────────────────────────────────
        const animate = useCallback((ts) => {
            const s = stateRef.current;
            if (!s.isPlaying) return;
            if (s.lastTimestamp===null) s.lastTimestamp=ts;
            const dt = Math.min((ts-s.lastTimestamp)/1000, 0.05);
            s.lastTimestamp=ts; s.t+=dt;

            // update left trail
            const massYL = EQ_Y_L + s.amplitudePx*Math.sin(2*Math.PI*s.frequency*s.t);
            s.leftTrail.unshift({y:massYL});
            if (s.leftTrail.length > PANEL_H*2) s.leftTrail.length=PANEL_H*2;

            const lCtx=leftRef.current?.getContext('2d');
            const rCtx=rightRef.current?.getContext('2d');
            if (lCtx) drawLeft(lCtx,s.t);
            if (rCtx) drawRight(rCtx,s.t);
            rafRef.current=requestAnimationFrame(animate);
        },[]);

        const drawStatic = useCallback(()=>{
            const s=stateRef.current;
            const lCtx=leftRef.current?.getContext('2d');
            const rCtx=rightRef.current?.getContext('2d');
            if (lCtx) drawLeft(lCtx,s.t);
            if (rCtx) drawRight(rCtx,s.t);
        },[]);

        useEffect(()=>{
            if (isPlaying){
                stateRef.current.lastTimestamp=null;
                rafRef.current=requestAnimationFrame(animate);
            } else {
                if (rafRef.current) cancelAnimationFrame(rafRef.current);
                drawStatic();
            }
            return ()=>{ if (rafRef.current) cancelAnimationFrame(rafRef.current); };
        },[isPlaying,animate]);

        useEffect(()=>{ if(!isPlaying) drawStatic(); },
            [amplitudeCm,frequency,waveSpeedCms,showGrid,showEqLine,showRope]);

        useEffect(()=>{ drawStatic(); },[]);

        const handleReset = () => {
            setIsPlaying(false);
            stateRef.current.t=0;
            stateRef.current.leftTrail=[];
            stateRef.current.lastTimestamp=null;
            setTimeout(drawStatic,30);
        };

        const lambdaCm = (waveSpeedCms/frequency).toFixed(1);
        const T        = (1/frequency).toFixed(2);
        const omega    = (2*Math.PI*frequency).toFixed(2);

        return (
            <div style={{minHeight:'100vh',background:'#0f1117',padding:'24px 20px 36px'}}>

                {/* header */}
                <div style={{textAlign:'center',marginBottom:20}}>
                    <h1 style={{fontFamily:"'DM Sans',sans-serif",fontSize:22,fontWeight:600,
                                color:'#f3f4f6',letterSpacing:'0.01em',margin:0}}>
                        Simple Harmonic Motion → Wave Motion
                    </h1>
                    <p style={{fontSize:13,color:'#6b7280',marginTop:5}}>
                        PHYS 1151 · SHM &amp; Waves
                    </p>
                </div>

                {/* canvases side by side */}
                <div style={{display:'flex',gap:12,justifyContent:'center',
                             alignItems:'flex-start',flexWrap:'wrap'}}>

                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                        <div className="panel-label">Simple Harmonic Motion</div>
                        <canvas ref={leftRef} width={LEFT_W} height={PANEL_H}
                            style={{borderRadius:8,background:'#141820'}}/>
                        <div className="sub-label">single oscillator · vertical trail</div>
                    </div>

                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                        <div className="panel-label">Coupled Oscillator Array</div>
                        <canvas ref={rightRef} width={RIGHT_W} height={PANEL_H}
                            style={{borderRadius:8,background:'#141820'}}/>
                        <div className="sub-label">each mass does SHM · phase delay increases rightward</div>
                    </div>

                </div>

                {/* controls */}
                <div style={{display:'flex',gap:14,justifyContent:'center',
                             alignItems:'flex-start',flexWrap:'wrap',marginTop:20}}>

                    {/* play/reset */}
                    <div className="card" style={{display:'flex',gap:10,alignItems:'center'}}>
                        <button className={`btn ${isPlaying?'btn-active':'btn-primary'}`}
                                onClick={()=>setIsPlaying(p=>!p)}>
                            {isPlaying?<Pause/>:<Play/>}{isPlaying?'Pause':'Play'}
                        </button>
                        <button className="btn btn-secondary" onClick={handleReset}>
                            <ResetIcon/> Reset
                        </button>
                    </div>

                    {/* sliders */}
                    <div className="card" style={{minWidth:270,display:'flex',flexDirection:'column',gap:14}}>
                        <div className="panel-label" style={{marginBottom:-4}}>Parameters</div>

                        <div>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                                <span className="ctrl-label">Amplitude</span>
                                <span className="value-display">{amplitudeCm.toFixed(1)} cm</span>
                            </div>
                            <input type="range" min="0.5" max="5" step="0.5" value={amplitudeCm}
                                onChange={e=>setAmplitudeCm(+e.target.value)}/>
                        </div>

                        <div>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                                <span className="ctrl-label">Frequency</span>
                                <span className="value-display">{frequency.toFixed(2)} Hz</span>
                            </div>
                            <input type="range" min="0.1" max="1.2" step="0.05" value={frequency}
                                onChange={e=>setFrequency(+e.target.value)}/>
                            <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                                <span className="sub-label">T = {T} s</span>
                                <span className="sub-label">ω = {omega} rad/s</span>
                            </div>
                        </div>

                        <div>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                                <span className="ctrl-label">Wave Speed</span>
                                <span className="value-display">{waveSpeedCms.toFixed(0)} cm/s</span>
                            </div>
                            <input type="range" min="3" max="20" step="1" value={waveSpeedCms}
                                onChange={e=>setWaveSpeedCms(+e.target.value)}/>
                            <span className="sub-label">λ = v / f = {lambdaCm} cm</span>
                        </div>
                    </div>

                    {/* toggles */}
                    <div className="card" style={{display:'flex',flexDirection:'column',gap:12}}>
                        <div className="panel-label" style={{marginBottom:-2}}>Display</div>
                        <Toggle value={showGrid}     onChange={setShowGrid}     label="Grid"/>
                        <Toggle value={showEqLine}   onChange={setShowEqLine}   label="Equilibrium line"/>
                        <Toggle value={showRope}     onChange={setShowRope}     label="Continuous wave"/>
                    </div>

                    {/* key idea */}
                    <div className="card" style={{maxWidth:300,borderLeft:'3px solid #1d4ed8'}}>
                        <div className="panel-label" style={{marginBottom:8}}>Key Idea</div>
                        <p style={{fontSize:12.5,color:'#d1d5db',lineHeight:1.75,margin:0}}>
                            Every mass undergoes identical SHM, but each is{' '}
                            <em style={{color:'#93c5fd'}}>delayed in phase</em>{' '}
                            relative to its neighbour. The phase of mass at position x is{' '}
                            φ = 2πfx/v, so the pattern{' '}
                            <em style={{color:'#93c5fd'}}>propagates</em>{' '}
                            rightward — a travelling wave.
                        </p>
                    </div>

                </div>

                <div style={{textAlign:'center',marginTop:24,fontSize:11,
                             color:'#374151',fontFamily:"'Space Mono',monospace"}}>
                    PHYS 1151 · Interactive Physics Simulations · Northeastern University
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SHMWave/>);
</script>
</body>
</html>
